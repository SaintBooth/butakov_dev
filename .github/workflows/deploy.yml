name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      # Netangels shared hosting runs the app from APP_PATH (entry point app.js)
      # and passes the listen address as APP_PORT/APP_IP. No docker on this host.
      - name: Assemble standalone bundle
        run: |
          mkdir -p bundle
          cp -r .next/standalone/. bundle/
          mkdir -p bundle/.next/static
          cp -r .next/static/. bundle/.next/static/
          cp -r public bundle/public
          # project package.json has "type": "module", so the shim must be ESM.
          # Listen on 0.0.0.0: the gateway connects via APP_IP, Next middleware
          # self-proxies via localhost. hello.js duplicates app.js because the
          # panel-managed APP_PATH points at hello.js by default.
          {
            echo "import { chdir } from 'node:process';"
            echo "import { dirname } from 'node:path';"
            echo "import { fileURLToPath } from 'node:url';"
            echo "if (process.env.APP_PORT && !process.env.PORT) process.env.PORT = process.env.APP_PORT;"
            echo "if (!process.env.HOSTNAME) process.env.HOSTNAME = '0.0.0.0';"
            echo "chdir(dirname(fileURLToPath(import.meta.url)));"
            echo "await import('./server.js');"
          } > bundle/app.js
          cp bundle/app.js bundle/hello.js

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p ${{ secrets.SSH_PATH }}/app

      - name: Upload bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'bundle/*'
          target: ${{ secrets.SSH_PATH }}/app.new
          strip_components: 1
          rm: true

      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.SSH_PATH }}
            rm -rf app.old
            mv app app.old
            mv app.new app
            touch reload
            rm -rf app.old

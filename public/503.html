<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Технические работы — butakov.dev</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        padding: 48px 40px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,.06);
      }
      .icon {
        width: 64px;
        height: 64px;
        background: #f0fdfa;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 28px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #0f172a;
      }
      p {
        font-size: 15px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .retry {
        font-size: 13px;
        color: #94a3b8;
        margin-top: 20px;
      }
      .contacts {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid #f1f5f9;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        color: #0d9488;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🔧</div>
      <h1>Технические работы</h1>
      <p>Сайт временно недоступен — проводим плановое обновление.</p>
      <p>Обычно это занимает не более 30 минут.</p>
      <p class="retry">Страница обновится автоматически через несколько минут.</p>
      <div class="contacts">
        <a href="https://t.me/SashaBooth">Написать в Telegram</a>
        <a href="mailto:hello@butakov.dev">hello@butakov.dev</a>
      </div>
    </div>
    <script>
      // Автообновление каждые 60 секунд
      setTimeout(() => location.reload(), 60000);
    </script>
  </body>
</html>
